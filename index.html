<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprunkiOS - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&family=Ubuntu+Mono&display=swap');

        :root {
            --bg-image: url('https://dn720807.ca.archive.org/0/items/wallpapersprunkiorenxpinki/Sprunki%20Oren%20x%20Pinki%20NightTime%20V2.2.png');
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Ubuntu', sans-serif;
            color: white;
        }

        /* Language Selector Screen */
        #language-screen {
            position: fixed; inset: 0;
            background: #000; z-index: 40000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .lang-card {
            background: rgba(255,255,255,0.05);
            padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* GRUB Menu */
        #grub-screen {
            position: fixed; inset: 0;
            background: #000; z-index: 20000;
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Ubuntu Mono', monospace;
        }
        .grub-box {
            border: 1px solid #555;
            padding: 15px; width: 85%; max-width: 700px;
            background: rgba(20,20,20,0.8);
        }
        .grub-item {
            padding: 4px 10px; cursor: pointer;
            margin: 2px 0; border: 1px solid transparent;
        }
        .grub-item.selected {
            background: #bbb; color: #000;
        }

        /* Boot Screen */
        #boot-screen {
            position: fixed; inset: 0;
            background: #000;
            z-index: 25000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* System Status Screen (Restart/Shutdown/Convert) */
        #system-status-screen {
            position: fixed; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--bg-image) center/cover;
            z-index: 30000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }

        .loader-circle {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ff9900;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Desktop Layout */
        #desktop {
            position: fixed; inset: 0;
            background: var(--bg-image) center/cover;
            display: none; z-index: 10;
        }

        /* Top Panel */
        .top-panel {
            position: absolute; top: -50px; left: 0;
            width: 100%; height: 32px;
            background: rgba(0, 0, 0, 0.75);
            display: flex; align-items: center;
            padding: 0 15px; font-size: 13px;
            transition: top 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            backdrop-filter: blur(12px);
        }
        .top-panel.visible { top: 0; }

        /* Dock Bottom */
        .dock-container {
            position: absolute; bottom: -100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 24px;
            display: flex; gap: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: bottom 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            backdrop-filter: blur(15px);
        }
        .dock-container.visible { bottom: 20px; }

        .dock-icon {
            width: 44px; height: 44px;
            cursor: pointer; transition: transform 0.2s;
            object-fit: contain;
        }
        .dock-icon:hover { transform: scale(1.2) translateY(-8px); }

        /* Closing Session Screen */
        #closing-screen {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 28000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
            opacity: 0; transition: opacity 0.5s ease;
        }

        /* Power Menu Overlay */
        #power-menu-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 15000; display: none;
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .power-box {
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            width: 320px; border-radius: 24px;
            padding: 24px; box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- Language Selector Screen -->
    <div id="language-screen">
        <div class="lang-card">
            <h2 class="text-2xl font-bold mb-8 tracking-wide">CHỌN NGÔN NGỮ / SELECT LANGUAGE</h2>
            <div class="flex gap-6">
                <button onclick="setLanguage('vi')" class="px-8 py-4 bg-orange-600 hover:bg-orange-500 rounded-2xl font-bold transition-all transform hover:scale-105">Tiếng Việt</button>
                <button onclick="setLanguage('en')" class="px-8 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all transform hover:scale-105">English</button>
            </div>
        </div>
    </div>

    <!-- GRUB Menu -->
    <div id="grub-screen">
        <div class="mb-6 text-center">
            <h1 class="text-xl font-bold tracking-widest text-gray-200">GNU GRUB v2.06 (SprunkiOS)</h1>
        </div>
        <div class="grub-box">
            <div class="grub-item selected" id="grub-opt-1" onclick="bootAction()">SprunkiOS (6.1.0-generic)</div>
            <div class="grub-item" id="grub-opt-2" onclick="bootAction()">Advanced options for SprunkiOS</div>
            <div class="grub-item" id="grub-opt-3" onclick="document.getElementById('bg-input').click()">[Cài đặt hình nền hệ thống]</div>
            <div class="grub-item" id="grub-opt-4" onclick="bootAction()">System Setup</div>
        </div>
        <p class="mt-8 text-xs text-gray-500"><span id="grub-timer-text">Tự động khởi động sau</span> <span id="grub-timer">5</span> <span id="grub-sec-text">giây</span>...</p>
    </div>

    <input type="file" id="bg-input" accept="image/*" onchange="handleBgSelect(event)">

    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="loader-circle"></div>
        <p id="boot-load-text" class="mt-6 text-[11px] tracking-[6px] font-bold text-white uppercase opacity-40">SprunkiOS Loading</p>
    </div>

    <!-- System Status Screen (Unified Loader) -->
    <div id="system-status-screen">
        <div class="loader-circle"></div>
        <p id="status-text" class="mt-6 text-[13px] tracking-[3px] font-bold text-white uppercase drop-shadow-lg text-center px-4"></p>
    </div>

    <!-- Closing Session Overlay -->
    <div id="closing-screen">
        <div class="text-white text-center">
            <div class="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin mx-auto mb-4"></div>
            <p id="closing-msg" class="text-lg font-medium drop-shadow-md"></p>
        </div>
    </div>

    <!-- Desktop -->
    <div id="desktop">
        <!-- Top Panel -->
        <div class="top-panel" id="panel">
            <div class="flex-1 flex gap-4 items-center">
                <span id="panel-activities" class="font-bold cursor-pointer"></span>
                <span id="panel-apps" class="text-gray-300 text-xs opacity-70"></span>
            </div>
            <div class="flex-1 text-center font-bold" id="clock">00:00</div>
            <div class="flex-1 flex justify-end gap-5 items-center">
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full text-green-400"></i>
                <i class="fa-solid fa-power-off cursor-pointer text-orange-400 hover:text-orange-300" onclick="togglePowerMenu(true)"></i>
            </div>
        </div>

        <!-- Dock Bottom -->
        <div class="dock-container" id="dock">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.svg" class="dock-icon" title="Chrome" onclick="handleChromeClick()">
            <img src="https://cdn-icons-png.flaticon.com/512/1004/1004758.png" class="dock-icon" title="Minesweeper">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968260.png" class="dock-icon" title="Files" onclick="handleFilesClick()">
        </div>
    </div>

    <!-- Power Menu -->
    <div id="power-menu-overlay" onclick="togglePowerMenu(false)">
        <div class="power-box" onclick="event.stopPropagation()">
            <h2 id="power-title" class="text-lg font-bold mb-6 text-center text-gray-800"></h2>
            <div class="space-y-2">
                <div class="flex items-center gap-4 p-4 hover:bg-gray-100 rounded-2xl cursor-pointer" onclick="handlePowerAction('shutdown')">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-red-600"><i class="fa-solid fa-power-off"></i></div>
                    <p id="power-shutdown" class="font-bold"></p>
                </div>
                <div class="flex items-center gap-4 p-4 hover:bg-gray-100 rounded-2xl cursor-pointer" onclick="handlePowerAction('restart')">
                    <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600"><i class="fa-solid fa-rotate-right"></i></div>
                    <p id="power-restart" class="font-bold"></p>
                </div>
            </div>
            <button id="power-close" class="w-full mt-6 py-3 bg-gray-200 rounded-2xl font-bold text-gray-700" onclick="togglePowerMenu(false)"></button>
        </div>
    </div>

    <script>
        let grubInterval;
        let isBooting = false;
        let currentLang = 'vi';

        const i18n = {
            vi: {
                converting: "Đang chuyển sang Tiếng Việt...",
                grub_opt_3: "[Cài đặt hình nền hệ thống]",
                grub_timer: "Tự động khởi động sau",
                grub_sec: "giây",
                boot_load: "SprunkiOS Đang tải",
                closing: "Đang đóng phiên làm việc...",
                shutdown_status: "Hệ thống đang tắt...",
                restart_status: "Đang khởi động lại SprunkiOS...",
                panel_activities: "Hoạt động",
                panel_apps: "Ứng dụng",
                power_title: "Tùy chọn nguồn",
                power_shutdown: "Tắt máy",
                power_restart: "Khởi động lại",
                power_close: "Đóng",
                chrome_msg: "Trình duyệt đang khởi động...",
                files_msg: "Files manager đang tải..."
            },
            en: {
                converting: "Loading converting English...",
                grub_opt_3: "[System Wallpaper Setup]",
                grub_timer: "Automatic boot in",
                grub_sec: "seconds",
                boot_load: "SprunkiOS Loading",
                closing: "Closing session...",
                shutdown_status: "System shutting down...",
                restart_status: "Restarting SprunkiOS...",
                panel_activities: "Activities",
                panel_apps: "Apps",
                power_title: "Power Options",
                power_shutdown: "Shut Down",
                power_restart: "Restart",
                power_close: "Close",
                chrome_msg: "Browser is starting...",
                files_msg: "Files manager is loading..."
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            const screen = document.getElementById('language-screen');
            const status = document.getElementById('system-status-screen');
            const statusText = document.getElementById('status-text');

            // Hiển thị màn hình Convert (Chỉ xảy ra 1 lần ở đây)
            screen.style.display = 'none';
            status.style.display = 'flex';
            statusText.innerText = (lang === 'en') ? i18n.en.converting : i18n.vi.converting;

            setTimeout(() => {
                applyLanguageStrings();
                status.style.display = 'none';
                document.getElementById('grub-screen').style.display = 'flex';
                startGrubTimer();
            }, 2500);
        }

        function applyLanguageStrings() {
            const t = i18n[currentLang];
            document.getElementById('grub-opt-3').innerText = t.grub_opt_3;
            document.getElementById('grub-timer-text').innerText = t.grub_timer;
            document.getElementById('grub-sec-text').innerText = t.grub_sec;
            document.getElementById('boot-load-text').innerText = t.boot_load;
            document.getElementById('closing-msg').innerText = t.closing;
            document.getElementById('panel-activities').innerText = t.panel_activities;
            document.getElementById('panel-apps').innerText = t.panel_apps;
            document.getElementById('power-title').innerText = t.power_title;
            document.getElementById('power-shutdown').innerText = t.power_shutdown;
            document.getElementById('power-restart').innerText = t.power_restart;
            document.getElementById('power-close').innerText = t.power_close;
        }

        function handleChromeClick() { alert(i18n[currentLang].chrome_msg); }
        function handleFilesClick() { alert(i18n[currentLang].files_msg); }

        function startGrubTimer() {
            let sec = 5;
            const display = document.getElementById('grub-timer');
            grubInterval = setInterval(() => {
                sec--;
                if(display) display.innerText = sec;
                if(sec <= 0) { clearInterval(grubInterval); bootAction(); }
            }, 1000);
        }

        function handleBgSelect(event) {
            const file = event.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.documentElement.style.setProperty('--bg-image', `url(${e.target.result})`);
                };
                reader.readAsDataURL(file);
            }
        }

        function bootAction() {
            if(isBooting) return;
            isBooting = true;
            clearInterval(grubInterval);
            document.getElementById('grub-screen').style.display = 'none';
            document.getElementById('boot-screen').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('panel').classList.add('visible');
                    document.getElementById('dock').classList.add('visible');
                }, 300);
            }, 2000);
        }

        function togglePowerMenu(s) { document.getElementById('power-menu-overlay').style.display = s ? 'flex' : 'none'; }

        function handlePowerAction(action) {
            const t = i18n[currentLang];
            togglePowerMenu(false);
            
            // Ẩn UI desktop
            document.getElementById('panel').classList.remove('visible');
            document.getElementById('dock').classList.remove('visible');
            
            setTimeout(() => {
                // Hiển thị màn hình đóng phiên (Closing Session)
                const closing = document.getElementById('closing-screen');
                closing.style.display = 'flex';
                setTimeout(() => closing.style.opacity = '1', 50);

                setTimeout(() => {
                    closing.style.opacity = '0';
                    setTimeout(() => {
                        closing.style.display = 'none';
                        
                        // Hiển thị màn hình trạng thái (Shutdown/Restart) - KHÔNG PHẢI CONVERT
                        const status = document.getElementById('system-status-screen');
                        const statusText = document.getElementById('status-text');
                        status.style.display = 'flex';
                        
                        // HIỂN THỊ ĐÚNG CHỮ RESTART HOẶC SHUTDOWN THEO NGÔN NGỮ
                        statusText.innerText = (action === 'shutdown') ? t.shutdown_status : t.restart_status;
                        
                        // Giả lập hoàn tất sau 3s
                        setTimeout(() => location.reload(), 3000);
                    }, 500);
                }, 1500);
            }, 500);
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
